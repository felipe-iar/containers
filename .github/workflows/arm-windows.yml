name: arm-windows

on:
  # Workflow dispatched manually
  workflow_dispatch:
  # Workflow under a monthly Patch Tuesday schedule
  schedule:
  - cron: '30 23 8-14 * 2'

permissions:
  contents: read
  packages: write

jobs:
  # Generate the -base image with the IAR Build tools for Arm (Linux)
  # *without* vendor-specific device support (tagged as :latest)
  #
  # The -minimal variant does not contain `cspybat`, `iarbuild` or `cstat`
  # and it is suitable for faster fetching and/or simpler tasks
  arm-base-linux:
    strategy:
      matrix:
        target: [ arm ]
        version: [ 9.60.4 ]
        variant:
        - base
        - minimal
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@main
    - if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - if: matrix.variant == 'minimal'
      uses: docker/build-push-action@v6
      with:
        file: ./.github/workflows/Dockerfile-${{ matrix.target }}.${{ matrix.variant }}
        build-args: |
          TARGET=${{ matrix.target }}
          VERSION=${{ matrix.version }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.variant }}
    - if: matrix.variant == 'base'
      uses: docker/build-push-action@v6
      with:
        file: ./.github/workflows/Dockerfile-${{ matrix.target }}.${{ matrix.variant }}
        build-args: |
          TARGET=${{ matrix.target }}
          VERSION=${{ matrix.version }}
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.variant }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:${{ matrix.version }}
          ghcr.io/${{ github.repository_owner }}/${{ matrix.target }}:latest

  # Generate variant images with the IAR Build Tools for Arm (Linux)
  # *with* vendor-specific device support
  arm-linux-device:
    needs: [ arm-base-linux ]
    strategy:
      matrix:
        target: [ arm ]
        version: [ 9.60.4 ]
        variant:
        - additional
        - microchip
        - renesas
        - nxp
        - infineon
        - st
        - ti
        timestamp: [ 20250303090915 ]
        registry-repo: [ "ghcr.io/${{ github.repository_owner }}" ]
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@main
    - if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        file: ./.github/workflows/Dockerfile-${{ matrix.target }}.device
        build-args: |
          TARGET=${{ matrix.target }}
          VERSION=${{ matrix.version }}
          VARIANT=${{ matrix.variant }}
          TIMESTAMP=${{ matrix.timestamp }}
          REGISTRY_REPO=${{ matrix.registry-repo }}
        push: ${{ github.event_name != 'pull_request' }}
        # With this the image to be pushed will be tagged as
        # ghcr.io/<account>/<target>:<version>-<variant>
        tags: ${{ matrix.registry-repo }}/${{ matrix.target }}:${{ matrix.version }}-${{ matrix.variant }}
